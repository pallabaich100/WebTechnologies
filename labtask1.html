<!DOCTYPE html>
<html>
<head>
    <title>Simple Table</title>
    <link rel="stylesheet" type="text/css" href="labtask1.css">
</head>
<body>
    <div class="section">
    <table>
       <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Noteboooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>
    </div>
    <br><br><br><br>

    <div class="info">
    <h1><b>Contact Information</b></h1>

    <div class="row">
    <label>Name</label>
    <input type="text">
    </div>

    <div class="row">
    <label>Email</label>
    <input type="email">
    </div>

    <div class="row">
    <label>Message</label>
    <textarea></textarea>
    </div>

    <div class="row"></div>
    <button>Submit</button>
    </div>
    
 </div>
</body>
</html>
