<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
    <fieldset>
        <legend>Student Registration Form</legend>
        <form onsubmit="return validateForm()">
            <table>
                <tr>
                    <td><div class="label">Name:</div></td>
                    <td><div class="gap"><input type="text" id="firstName"/>
                    <p id="fNameError" style="font-size: 10px; color: red;"></p></div></td>
                </tr>
                <tr>
                    <td><div class="label">Last Name:</div></td>
                    <td><input type="text" id="lastName"/>
                    <p id ="lNameError" style="font-size: 10px; color: red;"></p></td>
                </tr>
                <tr>
                    <td><div class="label">Student ID:</div></td>
                    <td><input type="text" id="studentId"/>
                    <p id="studentIdError" style="font-size: 10px; color: red;"></p></td>
                </tr>
                <tr>
                    <td><div class="label" >Email:</div></td>
                    <td><input type="email" id="email"/>
                    <p id="emailError" style="font-size: 10px; color: red;"></p></td>
                </tr>
                <tr>
                    <td><div class="label" >Credit Completed :</div></td>
                    <td><input type="text" id="creditCompleted"/>
                    <p id="creditCompletedError" style="font-size: 10px; color: red;"></p></td>
                </tr>
                <tr>
                    <td><div class="label">Department :</div></td>
                    <td>
                    <select id="department">
                       <option value="">Select Department</option>
                       <option value="CSE">CSE</option>
                       <option value="EEE">EEE</option>
                       <option value="BBA">BBA</option>
                       <option value="English">English</option>
                    </select>
                    <p id="departmentError" style="font-size: 10px; color: red;"></p>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="Submit" value="submit"></td>
                </tr>
            </table>
        </form>
    </fieldset>
    </div>
<h4>Registered Students Details:</h4>
<table border="1" id="studentTable">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Credit Completed</th>
            <th>Department</th>
        </tr>
    </table>
</body>
</html>
